version: "2.4"

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CUSTOMER_MANAGER_UI_HOST: 0.0.0.0
      CUSTOMER_MANAGER_UI_PORT: 8787
      WEWALLET_APP_DATA_DIR: /data/app_data
      WEWALLET_UI_DATA_DIR: /data/ui_data
      CUSTOMER_MANAGER_KB_DB: /data/ui_data/knowledge.sqlite
      HERMES_HOME: /opt/wewallet/hermes-home
      HERMES_AGENT_DIR: /opt/hermes-agent
      WEWALLET_COOKIE_SECURE: "${WEWALLET_COOKIE_SECURE:-0}"
      WEWALLET_SMS_DEBUG: "0"
    volumes:
      - ./runtime/app_data:/data/app_data
      - ./runtime/ui_data:/data/ui_data
      - ./.hermes-customer-manager:/opt/wewallet/hermes-home:ro
      - ./runtime/hermes-agent:/opt/hermes-agent:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 实时通话代理（语音/视频通话的 WS + 视觉/风控 HTTP）。
  # 只在 docker 内网监听 8870，由 Caddy 经 /rtc 反代过来（TLS 由 Caddy 终止），不对外开端口、不需要证书。
  realtime:
    build: ./realtime
    restart: unless-stopped
    env_file:
      - .env
    # TLS 由 Caddy 在边缘终止，容器内始终 http/ws，无需证书。
    environment:
      DOUBAO_REALTIME_PROXY_HOST: 0.0.0.0
      DOUBAO_REALTIME_PROXY_PORT: "8870"
    expose:
      - "8870"

  # 边缘反向代理：自动申请/续期 Let's Encrypt 受信任证书（绿锁，无警告），
  # 把 / 反代到 app、/rtc 反代到实时代理。80 用于 ACME 验证 + 跳转 443。
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      realtime:
        condition: service_started
    environment:
      # 解析到本机 IP 的域名。默认用免费 sslip.io（无需购买）；有自己的域名就在 .env 覆盖。
      WEWALLET_SITE_DOMAIN: "${WEWALLET_SITE_DOMAIN:-115-159-127-218.sslip.io}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./runtime/caddy_data:/data
      - ./runtime/caddy_config:/config
