# HTTP → HTTPS 跳转。getUserMedia（摄像头/麦克风）只能在安全上下文运行，
# 所以主页面必须走 HTTPS，否则语音/视频通话一开就报"无法获取麦克风/摄像头"。
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    proxy_read_timeout 360s;
    proxy_send_timeout 360s;
    proxy_connect_timeout 30s;

    location / {
        proxy_pass http://app:8787;
        proxy_http_version 1.1;
        # WebSocket 升级头（即便当前 app 不用 WS，保留以兼容将来同源反代实时代理）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}

# $connection_upgrade：有 Upgrade 头时为 "upgrade"，否则 "close"（WS 反代标准写法）。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
