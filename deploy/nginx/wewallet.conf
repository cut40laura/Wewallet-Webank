# WebSocket 升级用的连接头映射。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    proxy_read_timeout 360s;
    proxy_send_timeout 360s;
    proxy_connect_timeout 30s;

    # 端到端实时语音中继（WebSocket）。app 容器内的中继监听 8789；
    # 必须把 WEWALLET_VOICECALL_RELAY_HOST 设为 0.0.0.0，否则 nginx 跨容器连不到。
    location /voicecall-relay {
        proxy_pass http://app:8789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # 通话是长连接，别让 nginx 超时切断
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://app:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}

